name: Scrape Gold Phú Quý

on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Phú Quý scraper
        run: python3 vang_phu_quy/phu_quy.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull origin main --rebase || true
          git add vang_phu_quy/*.json
          git diff --cached --quiet || (git commit -m "Update gold prices $(date +'%Y-%m-%d %H:%M')" && git push)
