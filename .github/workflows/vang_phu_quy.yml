name: Scrape Gold Prices

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Phú Quý scraper
        run: python3 vang_phu_quy/phu_quy.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add **/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update gold prices $(date +'%Y-%m-%d %H:%M:%S')" && git push)
